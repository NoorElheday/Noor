<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نُور - الرقية الشرعية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #c5a02d; --bg: #020617; --text: #fff; --glass: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1); }
        body.light-mode { --bg: #7dd3fc; --text: #0c4a6e; --glass: rgba(255,255,255,0.4); --border: rgba(125,211,252,0.5); }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Tajawal', sans-serif; transition: 1s; min-height: 100vh; overflow-x: hidden; }
        
        .sky { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .sun { position: absolute; top: -150px; left: 10%; width: 100px; height: 100px; background: radial-gradient(circle, #fffd7f, #fdbb2d); border-radius: 50%; transition: 1.5s; }
        .moon { position: absolute; top: 60px; left: 10%; width: 80px; height: 80px; background: #f1f5f9; border-radius: 50%; transition: 1.5s; }
        .moon::after { content: ''; position: absolute; top: -10px; left: 30px; width: 80px; height: 80px; background: var(--bg); border-radius: 50%; transition: 1s; }
        body.light-mode .sun { top: 60px; } body.light-mode .moon { top: -150px; }

        .toggle-btn { position: fixed; top: 20px; left: 20px; z-index: 1000; background: var(--glass); border: 1px solid var(--border); color: var(--text); width: 50px; height: 50px; border-radius: 50%; cursor: pointer; backdrop-filter: blur(10px); }
        .back-home { position: fixed; top: 25px; right: 25px; color: var(--accent); text-decoration: none; font-weight: bold; z-index: 1000; }

        .container { max-width: 800px; margin: auto; padding: 100px 20px; }
        .ruqya-card { background: var(--glass); padding: 35px; border-radius: 35px; border: 1px solid var(--border); backdrop-filter: blur(20px); margin-bottom: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        h2 { font-family: 'Amiri'; color: var(--accent); font-size: 2.2rem; border-right: 5px solid var(--accent); padding-right: 15px; }
        .ayah-box { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px; font-family: 'Amiri'; font-size: 1.8rem; text-align: center; color: var(--accent); margin: 20px 0; border: 1px dashed var(--border); }
        li { margin-bottom: 15px; font-size: 1.1rem; list-style: none; position: relative; padding-right: 25px; }
        li::before { content: '✦'; position: absolute; right: 0; color: var(--accent); }
    </style>
</head>
<body>
    <div class="sky"><div class="sun"></div><div class="moon"></div></div>
    <button class="toggle-btn" onclick="document.body.classList.toggle('light-mode')"><i class="fa-solid fa-circle-half-stroke"></i></button>
    <a href="index.html" class="back-home">الرئيسية ←</a>

    <div class="container">
        <h1 style="text-align:center; color:var(--accent); font-family:'Amiri'; font-size: 3.5rem; margin-bottom: 50px;">الرقية الشرعية</h1>
        
        <div class="ruqya-card">
            <h2>من القرآن الكريم</h2>
            <div class="ayah-box">سورة الفاتحة</div>
            <div class="ayah-box">آية الكرسي</div>
            <div class="ayah-box">المعوذات (الإخلاص، الفلق، الناس)</div>
        </div>

        <div class="ruqya-card">
            <h2>من السنة النبوية</h2>
            <ul>
                <li>"أذهب البأس رب الناس، اشف وأنت الشافي، لا شفاء إلا شفاؤك".</li>
                <li>"بسم الله أرقيك، من كل شيء يؤذيك، ومن شر كل نفس أو عين حاسد".</li>
                <li>"أعوذ بكلمات الله التامات من شر ما خلق".</li>
            </ul>
        </div>
    </div>
</body>
</html>
