<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نُور - المكتبة الصوتية الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #c5a02d;
            --bg: #020617;
            --text: #fff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* وضع النهار */
        body.light-mode {
            --bg: #7dd3fc;
            --text: #0c4a6e;
            --glass: rgba(255, 255, 255, 0.4);
            --border: rgba(125, 211, 252, 0.5);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0; padding-bottom: 200px;
            background: var(--bg);
            color: var(--text);
            transition: background 1s, color 1s;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* تأثيرات السماء (الشمس والقمر) */
        .sky { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .sun {
            position: absolute; top: -150px; left: 10%;
            width: 100px; height: 100px;
            background: radial-gradient(circle, #fffd7f, #fdbb2d);
            border-radius: 50%;
            box-shadow: 0 0 50px #fffd7f;
            transition: top 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .moon {
            position: absolute; top: 70px; left: 10%;
            width: 80px; height: 80px;
            background: #f1f5f9;
            border-radius: 50%;
            box-shadow: 0 0 30px #f1f5f9;
            transition: top 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .moon::after {
            content: ''; position: absolute;
            top: -10px; left: 25px;
            width: 80px; height: 80px;
            background: var(--bg);
            border-radius: 50%;
            transition: background 1s;
        }

        body.light-mode .sun { top: 70px; }
        body.light-mode .moon { top: -150px; }

        /* التصميم */
        .header { padding: 40px 20px; text-align: center; }
        .header h1 { font-family: 'Amiri', serif; font-size: 3.2rem; color: var(--accent); margin: 0; }

        .container { max-width: 1000px; margin: auto; padding: 0 20px; position: relative; z-index: 10; }

        .glass-panel {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 25px;
            padding: 25px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        select {
            width: 100%; padding: 15px; border-radius: 12px;
            background: rgba(15, 23, 42, 0.8); color: white; border: 1px solid var(--accent);
            font-family: inherit; font-size: 1.1rem; cursor: pointer;
        }
        body.light-mode select { background: rgba(255,255,255,0.8); color: #0c4a6e; }

        .surah-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }

        .surah-item {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 15px; padding: 20px; text-align: center;
            cursor: pointer; transition: 0.3s;
            color: var(--text);
        }

        .surah-item:hover { background: var(--accent); color: #020617; transform: translateY(-5px); }

        .player-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(25px);
            padding: 20px; border-top: 3px solid var(--accent); z-index: 2000;
        }
        body.light-mode .player-bar { background: rgba(255,255,255,0.95); }

        .player-content { max-width: 800px; margin: auto; text-align: center; }
        audio { width: 100%; height: 45px; margin-top: 10px; }

        .top-nav { position: fixed; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 1001; }
        .nav-btn {
            background: var(--glass); border: 1px solid var(--border); color: var(--text);
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; text-decoration: none;
            backdrop-filter: blur(10px); cursor: pointer; transition: 0.3s;
        }
    </style>
</head>
<body onload="init()">

    <div class="sky"><div class="sun"></div><div class="moon"></div></div>

    <div class="top-nav">
        <button class="nav-btn" onclick="toggleTheme()"><i class="fa-solid fa-circle-half-stroke"></i></button>
        <a href="index.html" class="nav-btn"><i class="fa-solid fa-house"></i></a>
    </div>

    <div class="header">
        <h1>المكتبة الصوتية</h1>
        <p id="status" style="color: var(--accent)">تم تحديث القائمة ونظام التشغيل الذكي</p>
    </div>

    <div class="container">
        <div class="glass-panel">
            <select id="qariSelect">
                <option value="yasser">ياسر الدوسري</option>
                <option value="maher">ماهر المعيقلي</option>
                <option value="afs">مشاري العفاسي</option>
                <option value="ajm">أحمد العجمي</option>
                
                <option value="minsh">محمد صديق المنشاوي (مرتل)</option>
                <option value="sds">عبد الرحمن السديس</option>
                <option value="shur">سعود الشريم</option>
                <option value="shatri">أبو بكر الشاطري</option>
                <option value="hazza">هزاع البلوشي</option>
                <option value="qasm">ناصر القطامي</option>
                <option value="akdr">عبد الرشيد صوفي</option>
            </select>
        </div>
        <div class="surah-grid" id="grid"></div>
    </div>

    <div class="player-bar">
        <div class="player-content">
            <div id="playingInfo" style="font-weight: bold; color: var(--accent); min-height: 24px;"></div>
            <audio id="audioPlayer" controls autoplay></audio>
        </div>
    </div>

    <script>
        const surahs = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

        const serverList = [
            "https://server11.mp3quran.net/",
            "https://server12.mp3quran.net/",
            "https://server8.mp3quran.net/",
            "https://server10.mp3quran.net/",
            "https://server13.mp3quran.net/",
            "https://server7.mp3quran.net/",
            "https://server6.mp3quran.net/",
            "https://server9.mp3quran.net/"
        ];

        let currentServerIndex = 0;
        let currentSurahId = "";
        let currentQariPath = "";

        function init() {
            const grid = document.getElementById('grid');
            surahs.forEach((s, i) => {
                const item = document.createElement('div');
                item.className = 'surah-item';
                item.innerHTML = `<div style="font-size:12px; opacity:0.6">${i+1}</div><div style="font-weight:bold">${s}</div>`;
                item.onclick = () => startPlay(i + 1, s);
                grid.appendChild(item);
            });
        }

        function startPlay(id, name) {
            currentSurahId = id.toString().padStart(3, '0');
            currentQariPath = document.getElementById('qariSelect').value;
            currentServerIndex = 0; 
            document.getElementById('playingInfo').innerText = `جاري محاولة الاتصال...`;
            tryNextServer();
        }

        function tryNextServer() {
            if (currentServerIndex >= serverList.length) {
                document.getElementById('playingInfo').innerText = "عذراً، لم يتم العثور على سيرفر متاح.";
                return;
            }
            const player = document.getElementById('audioPlayer');
            player.src = `${serverList[currentServerIndex]}${currentQariPath}/${currentSurahId}.mp3`;
            player.onerror = () => {
                currentServerIndex++;
                tryNextServer();
            };
            player.onplaying = () => {
                const qariName = document.getElementById('qariSelect').options[document.getElementById('qariSelect').selectedIndex].text;
                document.getElementById('playingInfo').innerText = `تشغيل الآن: ${surahs[parseInt(currentSurahId)-1]} - ${qariName}`;
            };
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }
    </script>
</body>
</html>
