<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نُور - حصن المسلم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #c5a02d; --bg: #020617; --text: #fff; --glass: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1); }
        body.light-mode { --bg: #7dd3fc; --text: #0c4a6e; --glass: rgba(255,255,255,0.4); --border: rgba(125,211,252,0.5); }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Tajawal', sans-serif; transition: 1s; }
        .sky { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .sun { position: absolute; top: -150px; left: 10%; width: 100px; height: 100px; background: radial-gradient(circle, #fffd7f, #fdbb2d); border-radius: 50%; transition: 1.5s; }
        .moon { position: absolute; top: 60px; left: 10%; width: 80px; height: 80px; background: #f1f5f9; border-radius: 50%; transition: 1.5s; }
        .moon::after { content: ''; position: absolute; top: -10px; left: 30px; width: 80px; height: 80px; background: var(--bg); border-radius: 50%; transition: 1s; }
        body.light-mode .sun { top: 60px; } body.light-mode .moon { top: -150px; }
        
        .container { max-width: 800px; margin: auto; padding: 100px 20px; }
        .zkr-card { background: var(--glass); padding: 25px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 20px; backdrop-filter: blur(10px); cursor: pointer; position: relative; }
        .zkr-card:active { transform: scale(0.98); }
        .count { position: absolute; left: 20px; top: 20px; background: var(--accent); color: #000; padding: 5px 15px; border-radius: 10px; font-weight: bold; }
        .zkr-text { font-size: 1.3rem; line-height: 1.8; margin-top: 10px; }
        .zkr-card .source { font-size: 0.8rem; opacity: 0.6; margin-top: 10px; display: block; }
    </style>
</head>
<body>
    <div class="sky"><div class="sun"></div><div class="moon"></div></div>
    <button class="toggle-btn" onclick="document.body.classList.toggle('light-mode')" style="position:fixed; top:20px; left:20px; background:var(--glass); border:1px solid var(--border); color:var(--text); width:50px; height:50px; border-radius:50%;"><i class="fa-solid fa-circle-half-stroke"></i></button>
<a href="index.html" style="position:fixed; top:25px; right:25px; color:var(--accent); text-decoration:none; font-weight:bold;">الرئيسية ←</a>
    <div class="container">
        <h1 style="text-align:center; color:var(--accent);">أذكار المسلم اليومية</h1>
        
        <div class="zkr-card" onclick="updateCount(this, 33)">
            <span class="count">33</span>
            <div class="zkr-text">سبحان الله وبحمده</div>
            <span class="source">أجرها: حُطت خطاياه وإن كانت مثل زبد البحر.</span>
        </div>

        <div class="zkr-card" onclick="updateCount(this, 10)">
            <span class="count">10</span>
            <div class="zkr-text">اللهم صلِّ وسلم على نبينا محمد</div>
            <span class="source">أجرها: من صلى عليّ حين يصبح وحين يمسي أدركته شفاعتي.</span>
        </div>

        <div class="zkr-card" onclick="updateCount(this, 100)">
            <span class="count">100</span>
            <div class="zkr-text">أستغفر الله وأتوب إليه</div>
            <span class="source">أجرها: يفتح الله بها أبواب الرزق والرحمة.</span>
        </div>
    </div>

    <script>
        function updateCount(card, max) {
            let countSpan = card.querySelector('.count');
            let current = parseInt(countSpan.innerText);
            if (current > 0) {
                countSpan.innerText = current - 1;
            }
            if (parseInt(countSpan.innerText) === 0) {
                card.style.opacity = "0.4";
                card.style.borderColor = "var(--accent)";
            }
        }
    </script>
</body>
</html>
